name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm@11.6.0 install --frozen-lockfile

      - name: Verify
        run: corepack pnpm@11.6.0 verify

      - name: Install Playwright browsers
        run: corepack pnpm@11.6.0 exec playwright install --with-deps chromium

      - name: E2E
        run: corepack pnpm@11.6.0 test:e2e
